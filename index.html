<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>EnglishQuiz — Thi Trắc Nghiệm</title>

  <!-- Google Fonts: Outfit (headings) + Plus Jakarta Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            outfit: ['Outfit', 'sans-serif'],
            jakarta: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#eef2ff',
              100: '#e0e7ff',
              200: '#c7d2fe',
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#1e1b4b',
            },
            surface: '#f7f7fb',
          },
          keyframes: {
            slideUp: {
              '0%':   { opacity: '0', transform: 'translateY(18px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%':   { opacity: '0' },
              '100%': { opacity: '1' },
            },
            popIn: {
              '0%':   { opacity: '0', transform: 'scale(0.9)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            blink: {
              '0%, 100%': { opacity: '1' },
              '50%':       { opacity: '0.3' },
            },
          },
          animation: {
            slideUp: 'slideUp 0.35s ease forwards',
            fadeIn:  'fadeIn 0.3s ease forwards',
            popIn:   'popIn 0.25s cubic-bezier(.34,1.56,.64,1) forwards',
            blink:   'blink 1s ease-in-out infinite',
          },
        }
      }
    }
  </script>

  <!-- Mammoth.js — DOCX extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <!-- PDF.js — PDF extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="font-jakarta bg-surface min-h-screen antialiased">

  <div id="app">
    <!-- Screens are injected here by JS -->
  </div>

  <!-- ─── Scripts (order matters) ─── -->
  <script src="js/parser.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/setup.js"></script>
  <script src="js/exam.js"></script>
  <script src="js/result.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
